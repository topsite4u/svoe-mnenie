  <script>

    const tabs = ['feed', 'collections', 'saved'];

      { key: 'video', label: 'Видео' },

    const baseArticles = [
      { id: 1, title: 'Города учатся жить в режиме умного доверия', summary: 'Новые сервисы становятся новой формой публичного договора между городом и человеком.', source: 'NewsLab', author: 'Аня Кузнецова', category: 'политика', mood: 'сильный', time: '12 мин назад', opinion: true, tags: ['город', 'доверие', 'сервис'], body: 'Сильное медиа не просто сообщает факты. Оно помогает увидеть направление, в котором движется общество.', score: 92 },
      { id: 2, title: 'ИИ перестает быть инструментом и становится средой для работы', summary: 'Компании перестают считать AI функцией и проектируют вокруг них целые ритмы.', source: 'Tech Review', author: 'Илья Соловьёв', category: 'технологии', mood: 'технологичный', time: '24 мин назад', opinion: false, tags: ['AI', 'работа', 'продуктивность'], body: 'Сегодня ценен не только ответ, но и контекст, в котором этот ответ рождается.', score: 91 },
      { id: 3, title: 'Почему устойчивость стала новой формой роста для бизнеса', summary: 'Экономика больше не требует мгновенного роста. Нужна устойчивость и ясная логика.', source: 'Экономика дня', author: 'Михаил Романов', category: 'экономика', mood: 'глубокий', time: '41 мин назад', opinion: false, tags: ['рынок', 'устойчивость', 'стратегия'], body: 'Финансовая гибкость сегодня важнее прежней уверенности в линейном сценарии.', score: 87 },
      { id: 4, title: 'Культура перестает быть физическим пространством и становится персональной средой', summary: 'Музеи и архивы становятся частью повседневной культуры, а не отдельным форматом.', source: 'Культура+', author: 'София Левина', category: 'культура', mood: 'личный', time: '56 мин назад', opinion: false, tags: ['культура', 'музей', 'архив'], body: 'В новой среде культура воспринимается как личный ритм, который человек собирает сам.', score: 84 },
      { id: 5, title: 'Новые биосенсоры могут изменить отношение к долгосрочному лечению', summary: 'Медицина идет к точечным и мягким формам наблюдения, а не только к громоздким аппаратам.', source: 'Наука сегодня', author: 'Дина Григорьева', category: 'наука', mood: 'глубокий', time: '1 ч назад', opinion: false, tags: ['медицина', 'сенсоры', 'технологии'], body: 'Технологии становятся не только быстрее, но и человечнее.', score: 83 },
      { id: 6, title: 'Почему редакторский голос теперь важнее простой нейтральности', summary: 'В потоке фактов аудитория выбирает не просто информацию — она выбирает направление и смысл.', source: 'Editorial Lab', author: 'Олег Петров', category: 'мнения', mood: 'сильный', time: '1 ч 10 мин назад', opinion: true, tags: ['мнение', 'редакция', 'смысл'], body: 'Нейтральность без позиции быстро кажется пустой.', score: 90 },
      { id: 7, title: 'Фото, видео и текст — один язык, один ритм', summary: 'Современный медиапоток строится не по отдельным форматам, а по общему ощущению события.', source: 'Signal', author: 'Кирилл Меньшов', category: 'технологии', mood: 'личный', time: '1 ч 22 мин назад', opinion: false, tags: ['контент', 'формат', 'медиа'], body: 'Сегодня уже недостаточно просто добавить видео. Нужен единый редакторский язык.', score: 79 },
      { id: 8, title: 'Как медиа могут говорить с аудиторией без потери доверия', summary: 'Тональность, ясность и честная позиция становятся новой нормой.', source: 'NewsLab', author: 'Марина Шевцова', category: 'мнения', mood: 'глубокий', time: '1 ч 34 мин назад', opinion: true, tags: ['доверие', 'тон', 'коммуникация'], body: 'Настоящее доверие строится не на «много слов», а на точных и зрелых формулировках.', score: 88 },
      { id: 9, title: 'Локальная идентичность снова становится главным активом медиа', summary: 'Глобальные тренды не вытесняют локальный язык — они делают его ещё важнее.', source: 'Культмаркет', author: 'Марина Шевцова', category: 'культура', mood: 'личный', time: '1 ч 46 мин назад', opinion: false, tags: ['идентичность', 'локально', 'культура'], body: 'Сильное медиа удерживает свой голос даже в шуме глобальных шаблонов.', score: 80 },
      { id: 10, title: 'Квантовые исследования переходят от теории к рабочим пилотам', summary: 'Наука перестает быть только академической и начинает влиять на реальный бизнес.', source: 'Новые горизонты', author: 'Роман Дорофеев', category: 'наука', mood: 'технологичный', time: '2 ч назад', opinion: false, tags: ['квант', 'исследование', 'пилоты'], body: 'Сдвиг идет не в формулах, а в том, как люди начинают применять знания.', score: 77 },
      { id: 11, title: 'Время персональных рекомендаций: почему люди выбирают медиа с человеческим голосом', summary: 'Автоматические подборки больше не удивляют — нужна человеческая интонация.', source: 'Signal', author: 'Станислав Козлов', category: 'технологии', mood: 'личный', time: '2 ч 10 мин назад', opinion: false, tags: ['рекомендации', 'персонализация', 'голос'], body: 'Людям важны не только удобство и скорость, но и ощущение выбора.', score: 76 },
      { id: 12, title: 'Новый подход к общественным сервисам: от обслуживания к участию', summary: 'Крупные проекты перестают быть односторонними и становятся площадками для участия.', source: 'Городские решения', author: 'Наталья Белова', category: 'политика', mood: 'сильный', time: '2 ч 24 мин назад', opinion: false, tags: ['государство', 'сервис', 'участие'], body: 'Если сервис не даёт ощущения двусторонней связи, он остаётся просто интерфейсом.', score: 85 },
      { id: 13, title: 'Почему медиа с человеческим голосом набирают больше доверия', summary: 'Аудитория устала от бесцветной нейтральности и хочет ясной позиции.', source: 'Media Forum', author: 'Полина Власова', category: 'мнения', mood: 'глубокий', time: '3 ч назад', opinion: true, tags: ['доверие', 'голос', 'смысл'], body: 'Публика выбирает те издания, которые говорят не только о фактах, но и о том, зачем они важны.', score: 89 },
      { id: 14, title: 'Переход от информационного шума к смысловой структуре', summary: 'Люди хотят не огромный поток, а понятную систему вокруг самых важных тем.', source: 'Редакторский стол', author: 'Георгий Артемьев', category: 'экономика', mood: 'глубокий', time: '3 ч 10 мин назад', opinion: false, tags: ['структура', 'смысл', 'поток'], body: 'У современного пользователя возникает не «много новостей», а ощущение перегруженной среды.', score: 78 },
      { id: 15, title: 'Как открытые данные меняют поведение городских сообществ', summary: 'Города становятся более прозрачными, а люди — активнее в участии.', source: 'Open City', author: 'Виктория Фёдорова', category: 'политика', mood: 'технологичный', time: '3 ч 30 мин назад', opinion: false, tags: ['данные', 'город', 'прозрачность'], body: 'Появляется новая форма общественной обратной связи — не только через жалобы, но и через участие.', score: 81 },
      { id: 16, title: 'Этика дизайна в эпоху AI: когда интерфейс становится частью доверия', summary: 'Пользовательский опыт теперь напрямую влияет на восприятие качества информации.', source: 'Design Lab', author: 'Артём Чистяков', category: 'технологии', mood: 'личный', time: '3 ч 45 мин назад', opinion: false, tags: ['design', 'AI', 'доверие'], body: 'Интерфейс перестал быть просто оболочкой — он начинает формировать доверие к источнику.', score: 82 },
      { id: 17, title: 'Что происходит с культурой, когда она становится персональной', summary: 'Люди больше не потребляют культуру как массовый поток, а собирают её как личный архив.', source: 'Культура+', author: 'Данила Крылов', category: 'культура', mood: 'личный', time: '4 ч назад', opinion: false, tags: ['личное', 'архив', 'культура'], body: 'Смысл искусства теперь часто возникает не в музее, а в моменте выбора.', score: 79 },

    function hydrateState() {
      try {

        if (saved.activeTab) state.activeTab = saved.activeTab;
        if (saved.activeLane) state.activeLane = saved.activeLane;
        if (typeof saved.translateRss === 'boolean') state.translateRss = saved.translateRss;
      } catch (e) {}
      state.translationConsent = getSavedTranslationConsent()?.status || null;
      state.articles = [];
      state.opinions = opinionCards;
      state.trends = trends;
      state.stories = stories;
      try {
        const cached = JSON.parse(localStorage.getItem('newslab-rss-cache-v1') || 'null');
        if (cached?.items?.length) {
          state.rssCacheRaw = cached.rawItems || cached.items;
          state.rssCache = cached.items;
          state.rssUpdatedAt = cached.updatedAt || 0;
          state.articles = [...state.rssCache].sort((a, b) => b.score - a.score);
          if (state.translateRss) {
            setTimeout(async () => {

              state.articles = [...state.rssCache].sort((a, b) => b.score - a.score);

    function buildAIDigest(items) {
      const headlines = items.slice(0, 5).map(item => ({ title: item.title, source: item.source, time: item.time }));
      const tokens = {};
      items.forEach(item => {
        item.title.split(/\W+/).forEach(word => {
          const token = word.toLowerCase().replace(/[^a-zа-яё0-9]/gi, '');
          if (token.length > 4 && !['https', 'www', 'и', 'что', 'это', 'как', 'для'].includes(token)) {
            tokens[token] = (tokens[token] || 0) + 1;
          }
        });
      });
      const topics = Object.entries(tokens)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5)
        .map(([word]) => word);
      return { headlines, topics };
    }

    function attachMediaCards(container) {
      if (!container) return;
      const mediaElements = Array.from(container.querySelectorAll('.cover-media'));
      if (!mediaElements.length) return;
      const loadMedia = (element) => {
        const src = element.dataset.src;
        if (!src || element.dataset.loaded === 'true') return;
        element.dataset.loaded = 'true';
        if (element.tagName === 'VIDEO') {
          element.src = src;
          element.preload = 'auto';
          element.muted = true;
          element.playsInline = true;
          element.autoplay = true;
          element.loop = true;
          element.load();
          element.addEventListener('canplay', () => element.classList.add('is-ready'), { once: true });
          element.addEventListener('loadeddata', () => element.classList.add('is-ready'), { once: true });
        } else {
          element.src = src;
          element.addEventListener('load', () => element.classList.add('is-ready'), { once: true });
          element.addEventListener('error', () => element.classList.add('is-ready'), { once: true });
        }
      };
      mediaElements.slice(0, 3).forEach(loadMedia);
      if ('IntersectionObserver' in window) {
        const observer = new IntersectionObserver((entries, obs) => {
          entries.forEach(entry => {
            if (!entry.isIntersecting) return;
            const target = entry.target;
            loadMedia(target);
            obs.unobserve(target);
          });
        }, { rootMargin: '220px 0px' });
        mediaElements.slice(3).forEach(el => observer.observe(el));
      } else {
        mediaElements.slice(3).forEach(loadMedia);
      }
    }

        const liked = viewState.liked.has(item.id);
        const displayTime = item.time.replace(/\s*[AP]M$/i, '');
        const cover = 'linear-gradient(135deg, #111827 0%, #221107 100%)';
        const mediaType = getMediaType(item);
        const mediaUrl = getMediaUrl(item);
        const mediaPoster = getMediaPoster(item);
        const mediaMarkup = mediaType === 'video'
          ? `<video class="cover-media" data-src="${mediaUrl}" poster="${mediaPoster}" preload="metadata" muted playsinline></video>`
          : `<img class="cover-media" data-src="${mediaUrl}" alt="${item.title}" src="${mediaPoster}" loading="lazy" decoding="async" />`;
        return `
          <article class="feed-card" data-id="${item.id}" style="--delay:${index * 70}ms">
            <div class="card-top">
              <div class="author"><div class="avatar-mini">${item.author.charAt(0)}</div>${item.author}</div>
              <span class="badge rss">${item.source}</span>
            </div>
            <div class="cover" style="background:${cover};">
              ${mediaMarkup}
              <div class="cover-overlay">
                <div class="cover-top">
                  <span class="cover-score">${item.score}</span>
                </div>
                <strong>${item.title}</strong>
                <div class="cover-foot"><span>${displayTime}</span></div>
              </div>
              ${mediaType === 'video' ? '<span class="media-badge"><i class="fa-solid fa-play"></i> video</span>' : ''}
            </div>
            <div class="post-preview">
              <span>${item.summary}</span>
            </div>
            <h4>${item.title}</h4>
            <p>${item.summary}</p>
            <div class="feed-foot center-row">
              <span class="meta"><i class="fa-solid fa-clock"></i> ${displayTime}</span>
              <button class="action-btn icon-only ${liked ? 'active' : ''} like-btn" data-action="like" data-id="${item.id}" aria-label="Лайк"><i class="fa-solid fa-heart"></i></button>
              <button class="action-btn icon-only" data-action="open" data-id="${item.id}" aria-label="Читать"><i class="fa-solid fa-arrow-right"></i></button>
            </div>
          </article>`;
      }).join('');
      return { markup, counterText: `${filtered.length} материалов` };
      })();
      state.viewCache[key] = result;
      return result;
    }

    function renderFeed() {
      const container = document.getElementById('feedContainer');
      const key = getRenderKey();
      if (state.lastRenderKey === key && container.innerHTML) {
        return;
      }
      const payload = state.prefetchCache[state.activeTab] || getFeedMarkup();
      if (!state.prefetchCache[state.activeTab]) state.prefetchCache[state.activeTab] = payload;
      container.classList.add('is-switching');
      requestAnimationFrame(() => {
        container.innerHTML = payload.markup;
        container.querySelectorAll('[data-action]').forEach(btn => btn.addEventListener('click', e => {
          e.stopPropagation();
          const id = Number(btn.dataset.id);
          const action = btn.dataset.action;
          if (action === 'like') {
            // immediate visual feedback
            btn.classList.toggle('active');
            toggleLike(id);
          }
          if (action === 'open') openModal(id);
        }));
        container.querySelectorAll('.feed-card').forEach(card => card.addEventListener('click', e => {
          if (!e.target.closest('[data-action]')) openModal(Number(card.dataset.id));
        }));
        attachMediaCards(container);
        container.classList.remove('is-switching');
        container.classList.remove('is-loading');
        state.lastRenderKey = key;
      });
    }

    function scheduleRender() {
      if (state.pendingRerender) return;
      state.pendingRerender = requestAnimationFrame(() => {
        state.pendingRerender = null;
        render();
      });
    }

    function renderOpinions() {
      const container = document.getElementById('opinionContainer');
      if (!container) return;
      container.innerHTML = state.opinions.map(item => `<div class="mini-card"><h4>${item.title}</h4><p>${item.body}</p></div>`).join('');
    }

    function renderCollections() {
      const container = document.getElementById('collectionContainer');
      if (!container) return;
      container.innerHTML = collections.map(item => `<div class="mini-card" style="border-left: 4px solid ${item.color};"><h4>${item.title}</h4><p>${item.subtitle}</p></div>`).join('');
    }

    function renderTrends() {
      const container = document.getElementById('trendContainer');
      if (!container) return;
      container.innerHTML = state.trends.map((item, index) => `<div class="trend-item"><strong>${index + 1}. ${item}</strong><span>${index === 0 ? 'горячо' : 'на росте'}</span></div>`).join('');
    }

    function renderDashboard() {
      const focusCount = document.getElementById('focusCount');
      const likeCount = document.getElementById('likeCount');
      const collectionCount = document.getElementById('collectionCount');
      if (focusCount) focusCount.textContent = state.articles.length;
      if (likeCount) likeCount.textContent = state.liked.size;
      if (collectionCount) collectionCount.textContent = collections.length;
    }

    function prefetchNextTab() {
      const order = ['feed', 'collections', 'saved'];
      const currentIndex = order.indexOf(state.activeTab);
      const nextTab = order[(currentIndex + 1) % order.length];
      if (!state.prefetchCache[nextTab]) {
        state.prefetchCache[nextTab] = getFeedMarkup({ ...state, activeTab: nextTab });
      }
      const previousTab = order[(currentIndex + 2) % order.length];
      if (!state.prefetchCache[previousTab]) {
        state.prefetchCache[previousTab] = getFeedMarkup({ ...state, activeTab: previousTab });
      }
    }

    function updateLiveStatus() {
      const badge = document.getElementById('liveStatus');
      if (!badge) return;
      const delta = Math.max(0, Math.floor((Date.now() - (state.lastRefreshAt || Date.now())) / 1000));
      const label = delta < 5 ? 'обновлено только что' : delta < 60 ? `обновлено ${delta}с назад` : `обновлено ${Math.floor(delta / 60)}м назад`;
      badge.innerHTML = `<span class="dot"></span> ${label}`;
      badge.classList.toggle('is-refreshing', delta < 5);
    }

    function startLiveTicker() {
      updateLiveStatus();
      if (state.liveTicker) return;
      state.liveTicker = setInterval(updateLiveStatus, 1000);
    }

    function renderOverlays() {
      const storyOverlay = document.getElementById('storyOverlay');
      const reelOverlay = document.getElementById('reelOverlay');
      if (storyOverlay) {
        storyOverlay.classList.toggle('is-open', state.storyOverlayOpen);
        storyOverlay.setAttribute('aria-hidden', state.storyOverlayOpen ? 'false' : 'true');
        const story = stories[state.activeStoryIndex] || stories[0];
        const storyMedia = document.getElementById('storyMedia');
        const storyProgress = document.getElementById('storyProgress');
        if (storyMedia) {
          storyMedia.innerHTML = `
            <div class="story-content">
              <h4>${story.title}</h4>
              <p>${story.body}</p>
            </div>
          `;
        }
        if (storyProgress) {
          storyProgress.innerHTML = stories.map((_, index) => `<span>${index <= state.activeStoryIndex ? '<i></i>' : ''}</span>`).join('');
          const bars = storyProgress.querySelectorAll('span i');
          bars.forEach((bar, index) => {
            if (index === state.activeStoryIndex) {
              bar.style.animation = 'storyProgress 3.8s linear forwards';
            }
          });
        }
      }
      if (reelOverlay) {
        reelOverlay.classList.toggle('is-open', state.reelOverlayOpen);
        reelOverlay.setAttribute('aria-hidden', state.reelOverlayOpen ? 'false' : 'true');
        const reelStack = document.getElementById('reelStack');
        if (reelStack) {
          const reel = reels[state.activeReelIndex] || reels[0];
          reelStack.innerHTML = `
            <div class="reel-item">
              <strong>${reel.title}</strong>
              <span>${reel.body}</span>
            </div>
            <div class="reel-item">
              <strong>${reel.subtitle}</strong>
              <span>Переключитесь на следующий экран или закройте overlay.</span>
            </div>
          `;
        }
      }
    }

    function setOverlayBodyLock() {
      document.body.classList.toggle('overlay-open', state.storyOverlayOpen || state.reelOverlayOpen);
    }

    function startStoryAutoAdvance() {
      if (state.storyTimer) clearInterval(state.storyTimer);
      state.storyTimer = setInterval(() => {
        if (!state.storyOverlayOpen) return;
        state.activeStoryIndex = (state.activeStoryIndex + 1) % stories.length;
        renderOverlays();
      }, 4200);
    }

    function openStory(index) {
      state.activeStoryIndex = index;
      state.storyOverlayOpen = true;
      renderOverlays();
      setOverlayBodyLock();
      startStoryAutoAdvance();
    }

    function closeStory() {
      state.storyOverlayOpen = false;
      if (state.storyTimer) { clearInterval(state.storyTimer); state.storyTimer = null; }
      renderOverlays();
      setOverlayBodyLock();
    }

    function openReel(index) {
      state.activeReelIndex = index;
      state.reelOverlayOpen = true;
      renderOverlays();
      setOverlayBodyLock();
    }

    function closeReel() {
      state.reelOverlayOpen = false;
      renderOverlays();
      setOverlayBodyLock();
    }

    function render() {
      const app = document.querySelector('.app');
      app && app.classList.add('is-switching');
      const key = getRenderKey();
      state.viewHistory[key] = state.viewHistory[key] || { activeTab: state.activeTab, activeLane: state.activeLane };
      renderTabs();
      renderStories();
      renderReels();
      renderSectionNav();
      renderTranslationBanner();
      renderAIDigest();
      renderFeed();
      renderOpinions();
      renderCollections();
      renderTrends();
      renderDashboard();
      renderOverlays();
      persistState();
      prefetchNextTab();
      requestAnimationFrame(() => app && app.classList.remove('is-switching'));
    }

    function persistState() {
      localStorage.setItem('newslab-state-v3', JSON.stringify({
        liked: [...state.liked],
        activeTab: state.activeTab,
        activeLane: state.activeLane,
        translateRss: state.translateRss,
        translateTargetLang: state.translateTargetLang
      }));
    }

    function toggleLike(id) {
      if (state.liked.has(id)) state.liked.delete(id); else state.liked.add(id);
      // immediate persistence so favorites survive reloads
      persistState();
      // update any existing like buttons in DOM to reflect new state without full rerender
      document.querySelectorAll(`[data-action="like"][data-id="${id}"]`).forEach(btn => btn.classList.toggle('active', state.liked.has(id)));
      // update like counter if present
      const likeCount = document.getElementById('likeCount');
      if (likeCount) likeCount.textContent = state.liked.size;
      // invalidate caches so next full render (if any) is fresh, but avoid immediate full rerender to prevent flicker
      state.viewCache = {};
      state.renderVersion += 1;
    }


    function restoreView(snapshot = state.previousView) {
      if (!snapshot) return;
      setViewState({
        activeTab: snapshot.activeTab || state.activeTab,
        activeLane: snapshot.activeLane || state.activeLane,
        search: snapshot.search || ''
      });
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }

    function openModal(id) {
      const item = state.articles.find(article => article.id === id);
      if (!item) return;
      const modal = document.getElementById('modal');
      const card = document.getElementById('modalCard');
      const mediaType = getMediaType(item);
      const mediaUrl = getMediaUrl(item);
      const mediaPoster = getMediaPoster(item);
      const mediaMarkup = mediaType === 'video'
        ? `<div class="media-preview"><video src="${mediaUrl}" poster="${mediaPoster}" controls muted playsinline autoplay loop></video></div>`
        : `<div class="media-preview"><img src="${mediaUrl}" alt="${item.title}" /></div>`;
      card.innerHTML = `
        <button class="close-btn" id="modalClose"><i class="fa-solid fa-xmark"></i></button>
        <h3>${item.title}</h3>
        <div class="meta" style="margin-bottom: 12px;"><span><i class="fa-solid fa-user"></i> ${item.author}</span><span>•</span><span>${item.source}</span><span>•</span><span>${item.time}</span></div>
        ${mediaMarkup}
        <p>${item.body}</p>
        <p>${item.summary}</p>
        <div class="meta" style="margin-top: 14px;">${item.tags.map(tag => `<span class="badge rss">#${tag}</span>`).join('')}</div>
        <div class="hero-actions" style="margin-top: 16px;">
          <button class="secondary-btn icon-only" id="likeModalBtn" title="Лайк"><i class="fa-solid fa-heart"></i></button>
        </div>`;
      modal.classList.add('open');
      document.getElementById('modalClose').onclick = closeModal;
      document.getElementById('likeModalBtn').onclick = () => { toggleLike(item.id); closeModal(); };
      modal.onclick = e => { if (e.target === modal) closeModal(); };
    }

    function withTimeout(promise, ms) {
      return Promise.race([
        promise,
        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
      ]);
    }

    function normalizeRssItem(item, index) {
      const title = item.title || 'RSS материал';
      const description = (item.description || item.summary || '').replace(/<[^>]*>/g, '').trim();
      const summary = description.slice(0, 140) || 'Свежая заметка в ленте.';
      const body = (item.body || description || summary).slice(0, 240);
      const source = item.source || item.author || 'RSS feed';
      const author = item.author || item.source || source || 'RSS-агент';
      const image = item.image || item.enclosure?.link || item.thumbnail || item.mediaUrl || undefined;
      const pubDate = item.pubDate || item.published || item.updated || '';
      const time = pubDate ? new Date(pubDate).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : 'ново';
      const mediaType = item.mediaType || /video|clip|watch|live|stream/i.test(title) ? 'video' : 'image';
      return {
        id: 1000 + index + Math.floor(Math.random() * 1000),
        title,
        summary,
        source,
        author,
        time,
        opinion: false,
        tags: ['rss', 'live'],
        body,
        score: 90 + index,
        mediaType,
        image,
        poster: image
      };
    }

    function parseRssXml(xmlText) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xmlText, 'application/xml');
      const channelTitle = doc.querySelector('channel > title')?.textContent || 'RSS feed';
      const items = Array.from(doc.querySelectorAll('item')).slice(0, 1).map((node, index) => {
        const title = node.querySelector('title')?.textContent || '';
        const description = node.querySelector('description')?.textContent || node.querySelector('summary')?.textContent || '';
        const source = node.querySelector('source')?.textContent || channelTitle;
        const author = node.querySelector('author')?.textContent || source;
        const pubDate = node.querySelector('pubDate')?.textContent || node.querySelector('updated')?.textContent || '';
        const enclosure = node.querySelector('enclosure');
        const mediaThumbnail = node.getElementsByTagName('media:thumbnail')[0]?.getAttribute('url') || node.getElementsByTagName('thumbnail')[0]?.getAttribute('url');
        const image = enclosure?.getAttribute('url') || mediaThumbnail || undefined;
        return normalizeRssItem({ title, description, source, author, pubDate, image, enclosure: { link: image } }, index);
      });
      return items.filter(item => item.title && item.summary);
    }

    async function fetchRssFeed(url) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 1400);
      try {
        const response = await withTimeout(fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`, {
          signal: controller.signal,
          headers: { Accept: 'application/json' },
          cache: 'no-store'
        }), 2000);
        if (response.ok) {
          const data = await response.json();
          if (Array.isArray(data.items) && data.items.length) {
            return data.items.slice(0, 1).map((item, index) => normalizeRssItem(item, index));
          }
        }
      } catch (e) {
        // fallback to XML parsing proxy
      } finally {
        clearTimeout(timer);
      }

      try {
        const controller2 = new AbortController();
        const timer2 = setTimeout(() => controller2.abort(), 6000);
        const response = await withTimeout(fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, {
          signal: controller2.signal,
          cache: 'no-store'
        }), 6500);
        if (!response.ok) return [];
        const xmlText = await response.text();
        return parseRssXml(xmlText);
      } catch (e) {
        return [];
      }
    }

    async function translateText(text) {
      if (!text) return text;
      try {
        const response = await withTimeout(fetch('https://libretranslate.de/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ q: text, source: 'auto', target: state.translateTargetLang || 'ru', format: 'text' })
        }), 9000);
        if (!response.ok) return text;
        const json = await response.json();
        return json.translatedText || text;
      } catch (e) {
        return text;
      }
    }

    async function translateRssItems(items) {
      const translated = [];
      for (const item of items) {
        const [title, summary, body] = await Promise.all([
          translateText(item.title),
          translateText(item.summary),
          translateText(item.body)
        ]);
        translated.push({ ...item, title, summary, body });
      }
      return translated;
    }

    async function loadRssFeeds() {
      if (state.rssLoading) return;
      state.rssLoading = true;
      const cachedItems = state.rssCache || [];
      if (cachedItems.length) {
        state.articles = [...cachedItems].sort((a, b) => b.score - a.score);
        scheduleRender();
      }
      const settled = await Promise.allSettled(rssSources.map(source => fetchRssFeed(source.url)));
      const combined = settled.filter(result => result.status === 'fulfilled').flatMap(result => result.value);
      const uniqueItems = [...new Map(combined.map(item => [`${item.source}::${item.title}`, item])).values()];
      const rssRawItems = uniqueItems.slice(0, 500).map((item, index) => ({ ...item, id: 1000 + index }));
      state.aiScanSources = rssSources.length;
      state.aiDigest = buildAIDigest(rssRawItems);
      if (rssRawItems.length) {
        const rssTranslated = state.translateRss ? await translateRssItems(rssRawItems) : rssRawItems;
        state.rssCacheRaw = rssRawItems;
        state.rssCache = rssTranslated;
        state.rssUpdatedAt = Date.now();
        state.lastRefreshAt = Date.now();
        updateLiveStatus();
        localStorage.setItem('newslab-rss-cache-v1', JSON.stringify({ items: rssTranslated, rawItems: rssRawItems, updatedAt: state.rssUpdatedAt }));
        state.articles = [...rssTranslated].sort((a, b) => b.score - a.score);
        scheduleRender();
      }
      state.rssLoading = false;
    }

    function startAutoRssRefresh() {
      if (state.rssRefreshTimer) return;
      state.rssRefreshTimer = setInterval(() => {
        if (!state.rssLoading) loadRssFeeds();
      }, 60000);
    }

    function handleSwipe() {
      const app = document.querySelector('.app');
      if (!app) return;
      const order = ['feed', 'collections', 'saved'];
      const currentIndex = order.indexOf(state.activeTab);
      if (currentIndex < 0) return;
      const delta = state.touchEndX - state.touchStartX;
      if (Math.abs(delta) < 70) return;
      const nextIndex = delta < 0 ? (currentIndex + 1) % order.length : (currentIndex + order.length - 1) % order.length;
      switchTab(order[nextIndex]);
    }

    let touchStartX = 0;
    let touchEndX = 0;
    const swipeTarget = document.querySelector('.app');
    if (swipeTarget) {
      swipeTarget.addEventListener('touchstart', e => { state.touchStartX = e.changedTouches[0].screenX; }, { passive: true });
      swipeTarget.addEventListener('touchend', e => { state.touchEndX = e.changedTouches[0].screenX; handleSwipe(); }, { passive: true });
    }

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        if (state.storyOverlayOpen) closeStory();
        if (state.reelOverlayOpen) closeReel();
      }
    });
    document.getElementById('closeStoryBtn').addEventListener('click', closeStory);
    document.getElementById('closeReelBtn').addEventListener('click', closeReel);
    document.querySelectorAll('[data-close="story"]').forEach(el => el.addEventListener('click', closeStory));
    document.querySelectorAll('[data-close="reel"]').forEach(el => el.addEventListener('click', closeReel));
    document.getElementById('nextStoryBtn').addEventListener('click', () => {
      state.activeStoryIndex = (state.activeStoryIndex + 1) % stories.length;
      renderOverlays();
    });
    document.getElementById('prevStoryBtn').addEventListener('click', () => {
      state.activeStoryIndex = (state.activeStoryIndex - 1 + stories.length) % stories.length;
      renderOverlays();
    });
    const homeBtn = document.getElementById('homeBtn');
    if (homeBtn) {
      homeBtn.addEventListener('click', () => { switchTab('feed'); window.scrollTo({ top: 0, behavior: 'smooth' }); });
    }
    const favoritesBtn = document.getElementById('favoritesBtn');
    if (favoritesBtn) {
      favoritesBtn.addEventListener('click', () => { switchTab('saved'); window.scrollTo({ top: 0, behavior: 'smooth' }); });
    }
    const openCollectionsBtn = document.getElementById('openCollectionsBtn');
    if (openCollectionsBtn) {
      openCollectionsBtn.addEventListener('click', () => { switchTab('collections'); window.scrollTo({ top: 0, behavior: 'smooth' }); });
    }

    function updateMobileNavOpacity() {
      const nav = document.getElementById('mobileNav');
      if (!nav) return;
      const scrollTop = window.scrollY || document.documentElement.scrollTop;
      const pageHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = pageHeight > 0 ? scrollTop / pageHeight : 0;
      const opacity = progress <= 0.7 ? 1 : Math.max(0, 1 - (progress - 0.7) / 0.3);
      nav.style.setProperty('--mobile-nav-opacity', opacity.toFixed(3));
    }
    window.addEventListener('scroll', updateMobileNavOpacity, { passive: true });
    window.addEventListener('resize', updateMobileNavOpacity);
    updateMobileNavOpacity();
    hydrateState();
    startAutoRssRefresh();
  </script>
</body>
</html>
