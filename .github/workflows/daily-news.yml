name: Daily News Aggregator

on:
  schedule:
    # Запускается каждый день в 17:00 по UTC (это 20:00 по Москве)
    - cron: '0 17 * * *'
  workflow_dispatch: # Позволяет запустить вручную для теста

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run aggregator script
        run: python aggregator.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git commit -m "Auto-update: Новые новости на 20:00" || exit 0
          git push
